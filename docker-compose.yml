services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   # mount trained model
      - ./logs:/app/logs       # persist audit logs
    environment:
      - CORS_ORIGINS=*
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    command: ["streamlit", "run", "ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - api
    profiles:
      - demo   # only starts with: docker compose --profile demo up
